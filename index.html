<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estonian Open Air Museum — Where They Came From</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 40'><path d='M16 2 L2 16 L6 16 L6 36 L26 36 L26 16 L30 16 Z' fill='%238B4513'/></svg>">
</head>
<body>
    <header class="site-header">
        <div class="header-content">
            <h1 data-i18n="title">Estonian Open Air Museum</h1>
            <p class="subtitle" data-i18n="subtitle">Where the buildings came from</p>
        </div>
        <div class="lang-selector">
            <button class="lang-toggle" id="langToggle" title="Switch language">
                <span id="currentLang"></span>
                <svg width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
            </button>
            <div class="lang-dropdown" id="langDropdown"></div>
        </div>
    </header>
    <div id="map"></div>
    <button class="list-toggle" id="listToggle" title="Toggle building list">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
    </button>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2 data-i18n="buildings">Buildings</h2>
            <button class="sidebar-close" id="sidebarClose">&times;</button>
        </div>
        <div class="sidebar-list" id="sidebarList"></div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
    <div class="legend">
        <div class="legend-item">
            <svg width="18" height="22" viewBox="0 0 32 40"><path d="M16 2 L2 16 L6 16 L6 36 L26 36 L26 16 L30 16 Z" fill="#8B4513" stroke="#5C3D2E" stroke-width="2"/></svg>
            <span data-i18n="legendFarm">Farm / dwelling</span>
        </div>
        <div class="legend-item">
            <svg width="14" height="18" viewBox="0 0 24 32"><circle cx="12" cy="12" r="10" fill="#C4956A" stroke="#8B6914" stroke-width="2"/><circle cx="12" cy="12" r="4" fill="#FFF8DC"/><line x1="12" y1="22" x2="12" y2="30" stroke="#8B6914" stroke-width="2"/></svg>
            <span data-i18n="legendOther">Other building (mill, chapel, school...)</span>
        </div>
        <div class="legend-item">
            <svg width="14" height="14" viewBox="0 0 18 18"><circle cx="9" cy="9" r="7" fill="#D4A76A" stroke="#A67B3D" stroke-width="1.5"/><circle cx="9" cy="9" r="2.5" fill="#FFF8DC"/></svg>
            <span data-i18n="legendSub">Sub-building (linked to a farm)</span>
        </div>
        <div class="legend-item">
            <svg width="24" height="8"><line x1="0" y1="4" x2="24" y2="4" stroke="#8B4513" stroke-width="2" stroke-dasharray="4,4" opacity="0.5"/></svg>
            <span data-i18n="legendLine">Same farm exhibit</span>
        </div>
        <div class="legend-item">
            <svg width="18" height="20" viewBox="0 0 36 40"><rect x="4" y="16" width="28" height="22" fill="#2E4E2E" stroke="#1a301a" stroke-width="2"/><polygon points="18,4 2,16 34,16" fill="#2E4E2E" stroke="#1a301a" stroke-width="2"/></svg>
            <span data-i18n="legendMuseum">Open Air Museum (Tallinn)</span>
        </div>
    </div>
    <div class="footer">Made by Philippe H&acirc;che &middot; <a href="mailto:philsaare@gmail.com">philsaare@gmail.com</a></div>
</body>
</html>
